<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَسْمَة AI - الإدارة المستقرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .hidden { display: none; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loginPage" class="flex-grow flex items-center justify-center p-4">
        <div class="card p-8 w-full max-w-md text-center border-t-8 border-blue-600">
            <i class="fas fa-tooth fa-3x text-blue-600 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">بَسْمَة AI</h1>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-400">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-lg mb-6 outline-none focus:ring-2 focus:ring-blue-400">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">دخول</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-grow flex flex-col">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b">
            <h2 class="font-bold text-blue-800">د. زكريا محمد عطوني</h2>
            <button onclick="location.reload()" class="text-red-500 text-sm font-bold">خروج</button>
        </header>

        <main class="p-4 space-y-6">
            <div class="card p-6 border-r-8 border-green-500">
                <h3 class="font-bold mb-4 text-gray-700 underline">تسجيل مريض جديد:</h3>
                <input type="text" id="pName" placeholder="اسم المريض" class="w-full p-3 border rounded-lg mb-3">
                <textarea id="pDiagnosis" placeholder="الحالة أو التشخيص" class="w-full p-3 border rounded-lg mb-3 h-20"></textarea>
                <button onclick="savePatient()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">حفظ البيانات سحابياً</button>
            </div>

            <div class="card p-6 border-r-8 border-blue-500">
                <h3 class="font-bold mb-4 text-gray-700 italic">سجل المرضى المرفوع:</h3>
                <div id="patientList" class="space-y-3">
                    <p class="text-gray-400 text-center">انتظار البيانات من فايربيس...</p>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-white border-t py-4 text-center mt-auto">
        <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">تطوير: د. زكريا محمد عطوني</p>
    </footer>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = { databaseURL: "https://basma-clinic-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === "salematto@gmail.com" && pass === "zak1959") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadPatients();
            } else { alert("خطأ في البيانات!"); }
        }

        function savePatient() {
            const name = document.getElementById('pName').value;
            const diag = document.getElementById('pDiagnosis').value;
            if(name.trim() === "") { alert("يرجى كتابة الاسم"); return; }
            
            db.ref('patients').push({
                name: name,
                diagnosis: diag,
                date: new Date().toLocaleDateString()
            }).then(() => {
                alert("تم الحفظ!");
                document.getElementById('pName').value = '';
                document.getElementById('pDiagnosis').value = '';
            }).catch(err => alert("خطأ في الاتصال بالسحابة: " + err));
        }

        function loadPatients() {
            db.ref('patients').on('value', (snap) => {
                const list = document.getElementById('patientList');
                list.innerHTML = '';
                if(!snap.exists()) {
                    list.innerHTML = '<p class="text-center text-gray-400">لا يوجد مرضى مسجلين بعد</p>';
                    return;
                }
                snap.forEach((child) => {
                    const data = child.val();
                    list.innerHTML += `
                    <div class="p-3 bg-blue-50 border border-blue-100 rounded-lg shadow-sm">
                        <div class="flex justify-between">
                            <span class="font-bold text-blue-800">${data.name}</span>
                            <span class="text-[10px] text-gray-400">${data.date}</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-1">${data.diagnosis || '---'}</p>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
