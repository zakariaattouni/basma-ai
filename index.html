<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَسْمَة AI - الإصدار الثالث الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .hidden { display: none; }
        .tab-btn { flex: 0 0 auto; padding: 12px 20px; margin: 0 5px; border-radius: 15px; background: white; transition: 0.3s; font-size: 0.85rem; font-weight: bold; }
        .tab-btn.active { background: #1d4ed8; color: white; shadow: 0 4px 10px rgba(29, 78, 216, 0.3); }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .ai-result { border-right: 4px solid #4f46e5; background: #f5f3ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loginPage" class="flex-grow flex items-center justify-center p-4">
        <div class="card w-full max-w-md text-center">
            <i class="fas fa-tooth fa-3x text-blue-600 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">بَسْمَة AI <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full">V3.0</span></h1>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-4 border rounded-2xl mb-4 outline-none">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 border rounded-2xl mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700">دخول النظام</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-grow flex flex-col">
        <header class="bg-white p-4 flex justify-between items-center shadow-sm border-b px-6">
            <div class="flex items-center space-x-2 space-x-reverse"><i class="fas fa-tooth text-blue-600 text-2xl"></i><span class="font-bold text-xl text-blue-800">بَسْمَة AI</span></div>
            <div class="text-left"><span class="text-[10px] text-gray-400 block">المطور المسؤول</span><span class="text-sm font-bold text-blue-600 italic underline">د. زكريا محمد عطوني</span></div>
        </header>

        <nav class="bg-white p-3 sticky top-0 z-50 shadow-sm overflow-x-auto flex no-scrollbar border-b">
            <button onclick="showSection('add')" id="btn-add" class="tab-btn active"><i class="fas fa-user-plus ml-2"></i>مريض جديد</button>
            <button onclick="showSection('list')" id="btn-list" class="tab-btn"><i class="fas fa-database ml-2"></i>السجل الطبي</button>
            <button onclick="showSection('ai')" id="btn-ai" class="tab-btn text-indigo-700 bg-indigo-50"><i class="fas fa-brain ml-2"></i>الصيدلية الذكية</button>
            <button onclick="location.reload()" class="tab-btn text-red-500 font-bold border border-red-50">خروج</button>
        </nav>

        <main class="p-4 max-w-2xl mx-auto w-full space-y-6">
            
            <div id="section-add" class="card space-y-4">
                <h3 class="font-bold text-gray-700 flex items-center"><i class="fas fa-notes-medical ml-2 text-blue-600"></i>فتح ملف مريض</h3>
                <input type="text" id="pName" placeholder="اسم المريض الرباعي" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="pDiagnosis" placeholder="شكوى المريض (نبح، عالي، وارم...)" class="w-full p-4 bg-gray-50 border-none rounded-2xl h-28 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                
                <div class="border-2 border-dashed border-gray-200 p-6 rounded-2xl text-center">
                    <label class="cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-2"></i>
                        <p class="text-xs text-gray-400">إرفاق صورة الأشعة (X-Ray)</p>
                        <input type="file" class="hidden" id="pXray" accept="image/*">
                    </label>
                </div>

                <div id="inlineAI" class="hidden ai-result p-4 rounded-xl text-xs leading-relaxed text-indigo-900 mb-2 shadow-inner"></div>
                
                <div class="flex gap-2">
                    <button onclick="runAdvancedAI()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg"><i class="fas fa-magic ml-2"></i>البروتوكول الذكي</button>
                    <button onclick="savePatient()" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">حفظ الملف</button>
                </div>
            </div>

            <div id="section-ai" class="hidden card space-y-4">
                <h3 class="font-bold text-indigo-800"><i class="fas fa-capsules ml-2"></i>المساعد الدوائي والمواد السنية</h3>
                <input id="drugSearch" placeholder="ابحث عن دواء أو مادة (أطفال، عصب، حشوة)..." class="w-full p-4 border rounded-2xl outline-none border-indigo-100">
                <div id="drugResult" class="p-4 bg-indigo-50 rounded-2xl text-sm min-h-[100px] border border-indigo-100">
                    استخدم البحث لمعرفة الجرعات المناسبة أو أفضل المواد المستخدمة.
                </div>
                <button onclick="searchDrugs()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-md">بحث ذكي</button>
            </div>

            <div id="section-list" class="hidden space-y-4">
                <h3 class="font-bold px-2">تاريخ المراجعات</h3>
                <div id="patientList" class="space-y-4"></div>
            </div>

        </main>
    </div>

    <footer class="bg-white border-t py-8 text-center mt-auto">
        <p class="text-gray-700 text-sm font-bold">بَسْمَة AI &copy; 2026</p>
        <p class="text-[10px] text-gray-400">تم التصميم والتطوير بواسطة د. زكريا محمد عطوني</p>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://basma-clinic-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === "salematto@gmail.com" && pass === "zak1959") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadPatients();
            } else { alert("عذراً دكتور، تأكد من البيانات."); }
        }

        function showSection(name) {
            ['add', 'list', 'ai'].forEach(s => document.getElementById('section-'+s).classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-'+name).classList.remove('hidden');
            document.getElementById('btn-'+name).classList.add('active');
        }

        // (3) المساعد الذكي المطور (بروتوكولات ودوائيات)
        function runAdvancedAI() {
            const text = document.getElementById('pDiagnosis').value.toLowerCase();
            const resBox = document.getElementById('inlineAI');
            if(!text) return;
            resBox.classList.remove('hidden');
            resBox.innerHTML = "جاري تحليل الحالة وصياغة البروتوكول العلاجي...";
            
            setTimeout(() => {
                let protocol = "<b>البروتوكول:</b> يحتاج فحص سريري وأشعة ذروية.";
                if(text.includes("نبح") || text.includes("سهرني")) {
                    protocol = `<b>التشخيص:</b> التهاب عصب حاد (Pulpitis).<br>
                                <b>الخطة:</b> Pulpectomy.<br>
                                <b>المواد:</b> استخدام Sodium Hypochlorite 5.25% للإرواء + Calcium Hydroxide كضماد.<br>
                                <b>الدواء:</b> Amoxicillin 500mg (كل 8 ساعات) + Ibuprofen 400mg عند اللزوم.`;
                } else if(text.includes("وارم") || text.includes("خدي")) {
                    protocol = `<b>التشخيص:</b> خراج سني نشط.<br>
                                <b>الخطة:</b> تصريف القيح + تطهير قنوات.<br>
                                <b>الدواء:</b> Augmentin 1g (مرتين يومياً) + Flagyl 500mg (كل 8 ساعات).`;
                }
                resBox.innerHTML = protocol;
            }, 1000);
        }

        // (3) وظيفة البحث عن الأدوية والمواد
        function searchDrugs() {
            const query = document.getElementById('drugSearch').value.toLowerCase();
            const res = document.getElementById('drugResult');
            let data = "لم يتم العثور على معلومات دقيقة، يرجى مراجعة المرجع الدوائي.";
            
            if(query.includes("أطفال") || query.includes("طفل")) data = "<b>جرعة الأطفال:</b> Amoxicillin (20-40 mg/kg/day) مقسمة على 3 جرعات. Ibuprofen (5-10 mg/kg) كل 6-8 ساعات.";
            if(query.includes("حشوة") || query.includes("تجميل")) data = "<b>توصية المواد:</b> للحفر العميقة استخدم TheraCal LC كقاعدة واقية، ثم Composite نانوهجين للحصول على لمعان ومتانة عالية.";
            
            res.innerHTML = data;
        }

        function savePatient() {
            const name = document.getElementById('pName').value;
            const diag = document.getElementById('pDiagnosis').value;
            if(!name) return;
            db.ref('patients').push({
                name, diagnosis: diag, date: new Date().toLocaleDateString('ar-EG')
            }).then(() => {
                alert("تم حفظ الملف وتحديث السجل!");
                document.getElementById('pName').value = '';
                document.getElementById('pDiagnosis').value = '';
                document.getElementById('inlineAI').classList.add('hidden');
            });
        }

        // (2) استخراج تقرير PDF (محاكاة)
        function printReport(name, diag, date) {
            alert(`جاري تجهيز تقرير رسمي للمريض: ${name}\nبتاريخ: ${date}\nسيتم فتحه في نافذة الطباعة.`);
            window.print();
        }

        function loadPatients() {
            db.ref('patients').on('value', snap => {
                const list = document.getElementById('patientList');
                list.innerHTML = '';
                snap.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `
                    <div class="card bg-gray-50 border-none">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-blue-900">${d.name}</h4>
                            <button onclick="printReport('${d.name}', '${d.diagnosis}', '${d.date}')" class="text-xs bg-white border px-2 py-1 rounded-lg shadow-sm text-gray-500 hover:text-blue-600">
                                <i class="fas fa-print ml-1"></i> تقرير
                            </button>
                        </div>
                        <p class="text-xs text-gray-600">${d.diagnosis}</p>
                        <div class="mt-3 flex justify-between items-center text-[10px] text-gray-400">
                            <span>${d.date}</span>
                            <span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter">ملف مكتمل</span>
                        </div>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
