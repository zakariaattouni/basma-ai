<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَسْمَة AI - الإصدار المستقر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .tooth-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-bottom: 15px; }
        .tooth-btn { padding: 10px 2px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 11px; font-weight: bold; background: white; cursor: pointer; text-align: center; }
        .tooth-btn.selected { background: #2563eb; color: white; border-color: #1e40af; }
        .active-tab { color: #2563eb !important; border-bottom: 3px solid #2563eb; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20">

    <div id="loginPage" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-6">
        <div class="text-center w-full max-w-sm">
            <i class="fas fa-tooth fa-4x text-blue-600 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">دخول بَسْمَة AI</h1>
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 border rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">دخول النظام</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex flex-col">
        <header class="bg-white p-4 shadow-sm flex justify-between items-center border-b">
            <div class="flex items-center space-x-2 space-x-reverse">
                <i class="fas fa-tooth text-blue-600 text-xl"></i>
                <span class="font-bold text-lg text-blue-800">بَسْمَة AI</span>
            </div>
            <span class="text-xs font-bold text-gray-500">د. زكريا محمد عطوني</span>
        </header>

        <main class="p-4 max-w-xl mx-auto w-full">
            <section id="section-add" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="font-bold text-gray-700 mb-2">إضافة مراجعة جديدة</h3>
                
                <div class="tooth-grid" id="toothGrid">
                    </div>

                <input type="text" id="pName" placeholder="اسم المريض" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">
                <textarea id="pDiagnosis" placeholder="شكوى المريض بالعامية (نبح، وجع عالي..)" class="w-full p-4 bg-gray-50 rounded-2xl h-24 outline-none border border-gray-100"></textarea>
                
                <div id="aiIntelligence" class="hidden bg-indigo-50 p-4 rounded-2xl text-xs text-indigo-800 border border-indigo-100"></div>

                <div class="flex gap-2">
                    <button onclick="runMagicAI()" class="flex-1 bg-indigo-100 text-indigo-700 font-bold py-4 rounded-2xl border border-indigo-200">تحليل ذكي</button>
                    <button onclick="savePatient()" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-md">حفظ المريض</button>
                </div>
            </section>

            <section id="section-list" class="hidden space-y-4">
                <h3 class="font-bold text-gray-700 px-2">سجل المراجعات</h3>
                <div id="patientList" class="space-y-4"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
            <button onclick="showSection('add')" id="nav-add" class="flex flex-col items-center active-tab">
                <i class="fas fa-plus-circle text-xl"></i><span class="text-[10px] mt-1 font-bold">جديد</span>
            </button>
            <button onclick="showSection('list')" id="nav-list" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-list-ul text-xl"></i><span class="text-[10px] mt-1 font-bold">السجل</span>
            </button>
            <button onclick="location.reload()" class="flex flex-col items-center text-red-400">
                <i class="fas fa-power-off text-xl"></i><span class="text-[10px] mt-1 font-bold">خروج</span>
            </button>
        </nav>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://basma-clinic-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedTooth = null;

        // توليد أرقام الأسنان
        const grid = document.getElementById('toothGrid');
        const nums = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28, 48,47,46,45,44,43,42,41, 31,32,33,34,35,36,37,38];
        nums.forEach(n => {
            const b = document.createElement('button');
            b.className = 'tooth-btn';
            b.innerText = n;
            b.onclick = () => {
                document.querySelectorAll('.tooth-btn').forEach(btn => btn.classList.remove('selected'));
                b.classList.add('selected');
                selectedTooth = n;
            };
            grid.appendChild(b);
        });

        function handleLogin() {
            const pass = document.getElementById('password').value;
            if(pass === "zak1959") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadPatients();
            } else { alert("كلمة المرور غير صحيحة"); }
        }

        function showSection(name) {
            document.getElementById('section-add').classList.add('hidden');
            document.getElementById('section-list').classList.add('hidden');
            document.getElementById('section-'+name).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById('nav-'+name).classList.add('active-tab');
        }

        function runMagicAI() {
            const diag = document.getElementById('pDiagnosis').value.toLowerCase();
            const res = document.getElementById('aiIntelligence');
            if(!diag) return;
            res.classList.remove('hidden');
            res.innerHTML = "جاري التحليل...";
            setTimeout(() => {
                let msg = `<b>توصية للسن (${selectedTooth || 'غير محدد'}):</b><br>`;
                if(diag.includes("نبح") || diag.includes("سهرني")) msg += "التهاب عصب حاد. البروتوكول: سحب عصب + إرواء هيبوكلوريت.";
                else if(diag.includes("وارم")) msg += "خراج سني. الإجراء: تصريف ووصف مضاد حيوي.";
                else msg += "يُنصح بفحص الحيوية وصورة أشعة.";
                res.innerHTML = msg;
            }, 600);
        }

        function savePatient() {
            const name = document.getElementById('pName').value;
            const diag = document.getElementById('pDiagnosis').value;
            if(!name) return;
            db.ref('patients').push({ name, diagnosis: diag, tooth: selectedTooth, date: new Date().toLocaleDateString('ar-EG') })
              .then(() => {
                alert("تم الحفظ بنجاح!");
                document.getElementById('pName').value = '';
                document.getElementById('pDiagnosis').value = '';
                document.getElementById('aiIntelligence').classList.add('hidden');
                selectedTooth = null;
                document.querySelectorAll('.tooth-btn').forEach(b => b.classList.remove('selected'));
            });
        }

        function loadPatients() {
            db.ref('patients').on('value', snap => {
                const list = document.getElementById('patientList');
                list.innerHTML = '';
                snap.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border mb-3">
                        <div class="flex justify-between font-bold text-blue-900 text-sm"><span>${d.name}</span><span class="text-blue-500">سن: ${d.tooth || '--'}</span></div>
                        <p class="text-xs text-gray-500 mt-2">${d.diagnosis}</p>
                        <div class="text-[9px] text-gray-300 mt-2">${d.date}</div>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
