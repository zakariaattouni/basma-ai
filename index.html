<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَسْمَة AI - المساعد السني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        /* تصميم الفوتر ليكون ظاهراً بقوة */
        .main-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #e2e8f0; z-index: 9999; box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1); }
        .nav-btn { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; border: none; background: none; transition: 0.3s; }
        .nav-btn.active { color: #2563eb; background: #eff6ff; }
        .tooth-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .tooth-btn { padding: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 10px; font-weight: bold; background: white; }
        .tooth-btn.selected { background: #2563eb; color: white; border-color: #1e40af; }
    </style>
</head>
<body class="pb-24">

    <div id="loginPage" class="fixed inset-0 bg-blue-700 z-[10000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <i class="fas fa-tooth fa-3x text-blue-600 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">دخول بَسْمَة AI</h1>
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-4 border rounded-2xl mb-4 text-center outline-none border-gray-200 focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">فتح العيادة</button>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="bg-white p-4 shadow-sm border-b sticky top-0 z-50 flex justify-between items-center">
            <h1 class="font-bold text-blue-700"><i class="fas fa-tooth ml-2"></i>بَسْمَة AI</h1>
            <span class="text-[10px] text-gray-400">د. زكريا محمد عطوني</span>
        </header>

        <main class="p-4 max-w-md mx-auto">
            <div id="page-add" class="space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="font-bold text-gray-700 mb-4">إضافة مراجعة</h2>
                    <div class="tooth-grid mb-4" id="toothGrid"></div>
                    <input type="text" id="pName" placeholder="اسم المريض" class="w-full p-4 bg-gray-50 border rounded-2xl mb-4 outline-none">
                    <textarea id="pDiag" placeholder="شكوى المريض..." class="w-full p-4 bg-gray-50 border rounded-2xl mb-4 h-24 outline-none"></textarea>
                    
                    <div id="aiBox" class="hidden bg-indigo-50 p-4 rounded-2xl text-xs text-indigo-900 border border-indigo-100 mb-4"></div>

                    <div class="flex gap-2">
                        <button onclick="runMagicAI()" class="flex-1 bg-indigo-100 text-indigo-700 font-bold py-4 rounded-2xl border border-indigo-200">تحليل AI</button>
                        <button onclick="savePatient()" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-md">حفظ البيانات</button>
                    </div>
                </div>
            </div>

            <div id="page-list" class="hidden space-y-3 pb-20">
                <h2 class="font-bold text-gray-700 px-2 mb-4">أرشيف المراجعات</h2>
                <div id="patientContainer"></div>
            </div>
        </main>

        <footer class="main-footer">
            <button onclick="navTo('add')" id="btn-add" class="nav-btn active">
                <i class="fas fa-plus-circle text-2xl mb-1"></i>
                <span class="font-bold">إضافة</span>
            </button>
            <button onclick="navTo('list')" id="btn-list" class="nav-btn">
                <i class="fas fa-clipboard-list text-2xl mb-1"></i>
                <span class="font-bold">السجل</span>
            </button>
            <button onclick="location.reload()" class="nav-btn text-red-500">
                <i class="fas fa-power-off text-2xl mb-1"></i>
                <span class="font-bold">خروج</span>
            </button>
        </footer>
    </div>

    <script>
        const config = { databaseURL: "https://basma-clinic-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database();

        let currentTooth = null;

        function handleLogin() {
            if(document.getElementById('password').value === "zak1959") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                initTeeth();
                loadData();
            } else { alert("كلمة المرور خاطئة!"); }
        }

        function initTeeth() {
            const grid = document.getElementById('toothGrid');
            const nums = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28, 48,47,46,45,44,43,42,41, 31,32,33,34,35,36,37,38];
            grid.innerHTML = '';
            nums.forEach(n => {
                const b = document.createElement('button');
                b.className = 'tooth-btn';
                b.innerText = n;
                b.onclick = () => {
                    document.querySelectorAll('.tooth-btn').forEach(x => x.classList.remove('selected'));
                    b.classList.add('selected');
                    currentTooth = n;
                };
                grid.appendChild(b);
            });
        }

        function navTo(page) {
            document.getElementById('page-add').classList.add('hidden');
            document.getElementById('page-list').classList.add('hidden');
            document.getElementById('page-' + page).classList.remove('hidden');
            
            document.getElementById('btn-add').classList.remove('active');
            document.getElementById('btn-list').classList.remove('active');
            document.getElementById('btn-' + page).classList.add('active');
        }

        function runMagicAI() {
            const diag = document.getElementById('pDiag').value;
            const box = document.getElementById('aiBox');
            if(!diag) return;
            box.classList.remove('hidden');
            box.innerHTML = "تحليل ذكي لشكوى المريض...";
            setTimeout(() => {
                box.innerHTML = `<b>توصية د. زكريا (AI):</b> السن رقم ${currentTooth || 'غير محدد'} يتطلب مراجعة بروتوكول العلاج المحافظ أو اللبي بناءً على الوصف.`;
            }, 700);
        }

        function savePatient() {
            const n = document.getElementById('pName').value;
            const d = document.getElementById('pDiag').value;
            if(!n) return;
            db.ref('patients').push({ name: n, diag: d, tooth: currentTooth, date: new Date().toLocaleDateString('ar-EG') })
              .then(() => {
                  alert("تم الحفظ!");
                  document.getElementById('pName').value = '';
                  document.getElementById('pDiag').value = '';
                  document.getElementById('aiBox').classList.add('hidden');
                  currentTooth = null;
                  document.querySelectorAll('.tooth-btn').forEach(x => x.classList.remove('selected'));
              });
        }

        function loadData() {
            db.ref('patients').on('value', snap => {
                const cont = document.getElementById('patientContainer');
                cont.innerHTML = '';
                snap.forEach(c => {
                    const v = c.val();
                    cont.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border mb-3">
                        <div class="flex justify-between font-bold text-blue-900 text-sm"><span>${v.name}</span><span>#${v.tooth || '--'}</span></div>
                        <p class="text-[11px] text-gray-500 mt-2">${v.diag}</p>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
