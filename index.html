<script>
    // ✅ تهيئة فايربيس
    let db = null, firebaseReady = false;
    try {
        if (typeof firebase !== 'undefined') {
            const config = { databaseURL: "https://basma-clinic-default-rtdb.firebaseio.com/" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            firebaseReady = true;
        }
    } catch (e) { console.error(e); }
    
    const connBadge = document.getElementById('connBadge');
    if(firebaseReady) { connBadge.className = 'conn-indicator conn-online'; connBadge.innerText = '🟢 متصل'; }
    else { connBadge.className = 'conn-indicator conn-offline'; connBadge.innerText = '🔴 وضع محلي'; }
    
    let currentTooth = null, currentUser = null, patientsCache = [], aiApiKey = '';
    let lastPendingIds = [], pollingInterval = null;
    
    const LOCAL_KEY = 'basma_patients';
    const API_KEY = 'basma_ai_api_key';
    const EXTERNAL_APPS_KEY = 'basma_external_apps';
    
    // ✅ دوال التخزين المحلي
    function getLocalDB() { try { return JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]'); } catch { return []; } }
    function saveLocalDB(data) { try { localStorage.setItem(LOCAL_KEY, JSON.stringify(data)); return true; } catch { showToast("❌ فشل الحفظ", "error"); return false; } }
    function addToLocalDB(record) { const localDB = getLocalDB(); if(!localDB.some(p => p.id === record.id)) { localDB.push(record); saveLocalDB(localDB); } }
    function updateLocalDB(id, newData) { const localDB = getLocalDB(); const idx = localDB.findIndex(p => p.id === id || p.firebaseId === id); if(idx !== -1) { localDB[idx] = { ...localDB[idx], ...newData, id: localDB[idx].id, firebaseId: localDB[idx].firebaseId || id }; return saveLocalDB(localDB); } return false; }
    function deleteFromLocalDB(id) { saveLocalDB(getLocalDB().filter(p => p.id !== id && p.firebaseId !== id)); }
    
    // ✨ دوال التطبيقات الخارجية - مُبسّطة ومضمونة
    function saveExternalApps() {
        const apps = [];
        for(let i=1; i<=3; i++) {
            const name = document.getElementById('app'+i+'Name').value.trim();
            const url = document.getElementById('app'+i+'Url').value.trim();
            const icon = document.getElementById('app'+i+'Icon').value;
            const color = document.getElementById('app'+i+'Color').value;
            if(name && url) apps.push({name, url, icon, color});
        }
        
        try {
            if(apps.length > 0) {
                localStorage.setItem(EXTERNAL_APPS_KEY, JSON.stringify(apps));
                // حفظ في فايربيس أيضاً
                if(firebaseReady && db && currentUser?.role === 'admin') {
                    db.ref('app_settings/external_apps').set(apps).catch(()=>{});
                }
            } else {
                localStorage.removeItem(EXTERNAL_APPS_KEY);                if(firebaseReady && db) db.ref('app_settings/external_apps').remove().catch(()=>{});
            }
            renderExternalApps();
            showToast(apps.length > 0 ? "✅ تم الحفظ" : "🗑️ تم الحذف", "success");
        } catch(e) {
            console.error(e);
            showToast("❌ فشل الحفظ: " + e.message, "error");
        }
    }
    
    function loadExternalAppsSettings() {
        try {
            const saved = localStorage.getItem(EXTERNAL_APPS_KEY);
            if(!saved) { showToast("ℹ️ لا توجد تطبيقات محفوظة", "info"); return; }
            const apps = JSON.parse(saved);
            apps.forEach((app, i) => {
                const n = i+1;
                document.getElementById('app'+n+'Name').value = app.name || '';
                document.getElementById('app'+n+'Url').value = app.url || '';
                document.getElementById('app'+n+'Icon').value = app.icon || 'apple-alt';
                document.getElementById('app'+n+'Color').value = app.color || 'blue';
            });
            showToast("✅ تم التحميل", "success");
        } catch(e) { showToast("❌ خطأ: " + e.message, "error"); }
    }
    
    function renderExternalApps() {
        const section = document.getElementById('externalAppsSection');
        const container = document.getElementById('appsContainer');
        if(!section || !container) return;
        
        try {
            const saved = localStorage.getItem(EXTERNAL_APPS_KEY);
            const apps = saved ? JSON.parse(saved) : [];
            
            if(!apps || apps.length === 0) {
                section.classList.add('d-none');
                return;
            }
            
            section.classList.remove('d-none');
            container.innerHTML = '';
            
            apps.forEach(app => {
                if(!app.name || !app.url) return;
                container.innerHTML += `
                    <a href="${app.url}" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center justify-center p-3 bg-gradient-to-br from-gray-50 to-white rounded-xl border border-gray-100 hover:shadow-md transition">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white mb-2 bg-${app.color}-500">
                            <i class="fas fa-${app.icon}"></i>
                        </div>                        <span class="text-xs font-medium text-gray-700 text-center line-clamp-1">${app.name}</span>
                    </a>
                `;
            });
        } catch(e) { console.error('Render error:', e); }
    }
    
    // ✅ دوال الدخول والتنقل
    function switchLogin(type) {
        const tabA = document.getElementById('tabAdmin'), tabD = document.getElementById('tabDoctor');
        const formA = document.getElementById('adminLoginForm'), formD = document.getElementById('doctorLoginForm');
        if(type === 'admin'){ 
            tabA.className = 'flex-1 py-2 rounded-xl bg-blue-600 text-white text-sm font-medium'; 
            tabD.className = 'flex-1 py-2 rounded-xl bg-gray-100 text-gray-600 text-sm font-medium'; 
            formA.classList.remove('d-none'); formD.classList.add('d-none'); 
        } else { 
            tabD.className = 'flex-1 py-2 rounded-xl bg-blue-600 text-white text-sm font-medium'; 
            tabA.className = 'flex-1 py-2 rounded-xl bg-gray-100 text-gray-600 text-sm font-medium'; 
            formD.classList.remove('d-none'); formA.classList.add('d-none'); 
        }
    }
    function openSubscribe() { document.getElementById('loginPage').classList.add('d-none'); document.getElementById('mainContent').classList.remove('d-none'); navTo('subscribe'); }
    function backToLogin() { document.getElementById('mainContent').classList.add('d-none'); document.getElementById('loginPage').classList.remove('d-none'); }
    
    function handleAdminLogin() {
        const pwd = document.getElementById('adminPassword').value.trim();
        if(pwd === "zak1959") { 
            currentUser = { role: 'admin', id: 'admin_001' }; 
            showToast("✅ تم الدخول!", "success"); 
            setTimeout(afterLogin, 400); 
        } else showToast("❌ كلمة المرور غير صحيحة", "error");
    }
    
    function handleDoctorLogin() {
        try {
            const email = document.getElementById('doctorEmail').value.trim(), pwd = document.getElementById('doctorPassword').value.trim();
            if(!email || !pwd) return showToast("أدخل البريد وكلمة المرور", "error");
            if(!firebaseReady) return showToast("⚠️ دخول الأطباء يتطلب اتصالاً بـ Firebase", "info");
            showToast("🔄 جاري التحقق...", "info");
            db.ref('doctor_subscriptions').orderByChild('email').equalTo(email).once('value').then(snap => {
                if(!snap.exists()) return showToast("❌ حساب غير موجود", "error");
                let found = null; snap.forEach(c => { if(c.val().password === pwd) found = {id: c.key, ...c.val()}; });
                if(!found) return showToast("❌ كلمة المرور خاطئة", "error");
                if(found.status !== 'active') return showToast("⏳ حسابك قيد المراجعة", "warning");
                currentUser = { role: 'doctor', ...found }; showToast("✅ تم الدخول!", "success"); setTimeout(afterLogin, 400);
            }).catch(() => showToast("فشل الاتصال", "error"));
        } catch(e) { showToast("❌ خطأ في الدخول", "error"); }
    }
    
    function afterLogin() {        document.getElementById('loginPage').classList.add('d-none'); 
        document.getElementById('mainContent').classList.remove('d-none'); 
        document.getElementById('userBar').classList.remove('d-none');
        
        if(currentUser.role === 'admin') { 
            document.getElementById('userTypeDisplay').innerText = 'مدير النظام'; 
            document.getElementById('adminSection').classList.remove('d-none'); 
            startSubscriptionPolling();
            loadActiveDoctors();
            aiApiKey = localStorage.getItem(API_KEY) || '';
            document.getElementById('aiApiKey').value = aiApiKey;
        } else { 
            document.getElementById('userTypeDisplay').innerText = `د. ${currentUser.name}`; 
            document.getElementById('adminSection').classList.add('d-none'); 
        }
        
        initTeeth(); 
        loadData(); 
        updateStats(); 
        checkAppointmentAlerts(); 
        navTo('home');
        
        // ✨ عرض التطبيقات بعد الدخول
        setTimeout(renderExternalApps, 100);
        
        if('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    }
    
    function logout() { 
        currentUser = null; 
        if(pollingInterval) clearInterval(pollingInterval);
        backToLogin(); 
        ['adminPassword','doctorEmail','doctorPassword'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; }); 
    }
    
    function showToast(msg, type='info') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div'); t.className = `toast ${type}`; 
        t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':type==='warning'?'triangle-exclamation':'info-circle'}"></i><span class="text-sm">${msg}</span>`;
        c.appendChild(t); setTimeout(()=> { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 3000);
    }
    
    function showBrowserNotification(title, body) {
        if('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, { body, icon: '🦷' });
        }
    }
    
    function navTo(page) {
        document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('d-none'));        const target = document.getElementById(`page-${page}`); if(target) target.classList.remove('d-none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const btnMap = {home:'home', add:'add', ai:'ai', list:'list'}, btn = document.getElementById(`btn-${btnMap[page]||'home'}`);
        if(btn) btn.classList.add('active');
        if(page === 'list') { loadData(); updateStats(); }
        if(page === 'home') { loadTodayAppointments(); checkAppointmentAlerts(); setTimeout(renderExternalApps, 50); }
        window.scrollTo(0, 0);
    }
    
    function initTeeth() {
        const grid = document.getElementById('toothGrid'); if(!grid) return; grid.innerHTML = '';
        [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28,48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38].forEach(n => {
            const b = document.createElement('button'); b.type = 'button'; b.className = 'tooth-btn'; b.innerText = n;
            b.onclick = () => { document.querySelectorAll('.tooth-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); currentTooth = n; document.getElementById('selectedTooth').classList.remove('d-none'); document.getElementById('toothNum').innerText = n; };
            grid.appendChild(b);
        });
    }
    
    // ✅ دوال الذكاء الاصطناعي
    function saveApiKey() {
        const key = document.getElementById('aiApiKey').value.trim();
        if(key) { localStorage.setItem(API_KEY, key); aiApiKey = key; showToast("✅ تم حفظ المفتاح", "success"); }
        else { localStorage.removeItem(API_KEY); aiApiKey = ''; showToast("ℹ️ تم المسح", "info"); }
    }
    
    async function testApiKey() {
        const key = document.getElementById('aiApiKey').value.trim();
        if(!key) return showToast("❌ أدخل المفتاح أولاً", "error");
        showToast("🔄 جاري الفحص...", "info");
        try {
            const res = await fetch("https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta", {
                headers: { "Authorization": `Bearer ${key}` },
                body: JSON.stringify({ inputs: "test", parameters: { max_new_tokens: 5 } }),
                method: "POST"
            });
            if(res.ok) { localStorage.setItem(API_KEY, key); aiApiKey = key; showToast("✅ المفتاح صالح", "success"); }
            else throw new Error(`خطأ: ${res.status}`);
        } catch(e) { showToast(e.message, "error"); }
    }
    
    async function runAdvancedAI_Live() {
        const input = document.getElementById('aiInput').value.trim();
        const outputBox = document.getElementById('aiOutputBox');
        const resultDiv = document.getElementById('aiResult');
        if(!input) return showToast("❌ اكتب الأعراض أولاً", "error");
        
        outputBox.classList.remove('d-none');
        resultDiv.innerHTML = '<div class="text-center py-4"><i class="fas fa-brain fa-pulse text-purple-600 text-2xl mb-2"></i><br><span class="text-xs text-gray-500 typing-effect">جاري التحليل...</span></div>';
        
        try {            let currentKey = aiApiKey || localStorage.getItem(API_KEY) || '';
            const prompt = `أنت طبيب أسنان خبير. حلل: "${input}". أعطي: 1. التشخيص 2. الخطة 3. نصيحة.`;
            
            let text, sourceName;
            if(currentKey && currentKey.length > 10) {
                const res = await fetch(`https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${currentKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 500, return_full_text: false } })
                });
                if(!res.ok) throw new Error(`خطأ: ${res.status}`);
                const data = await res.json();
                text = data[0]?.generated_text || "لا توجد إجابة";
                sourceName = "Hugging Face";
            } else {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`);
                text = await res.text();
                sourceName = "مجاني";
            }
            resultDiv.innerHTML = `<div class="bg-purple-50 p-3 rounded-lg border text-sm">${text.replace(/\n/g, '<br>')}</div><div class="text-[10px] text-gray-400 mt-1">* بواسطة ${sourceName}</div>`;
            showToast("✅ تم التحليل", "success");
        } catch(e) {
            resultDiv.innerHTML = `<div class="bg-amber-50 p-3 rounded-lg border text-sm">⚠️ ${e.message}</div>`;
            showToast("⚠️ فشل", "warning");
        }
    }
    
    function clearAI() { document.getElementById('aiInput').value=''; document.getElementById('aiOutputBox').classList.add('d-none'); document.getElementById('aiResult').innerHTML=''; }
    
    function runMagicAI() {
        const diag = document.getElementById('pDiag').value.trim(), b=document.getElementById('aiBox');
        if(!diag) return showToast("اكتب الشكوى أولاً","error");
        b.classList.remove('d-none'); b.innerHTML='<div class="text-center"><i class="fas fa-spinner fa-spin text-indigo-600"></i> جاري...</div>';
        setTimeout(()=>b.innerHTML=`<b>💡 توصية:</b> السن #${currentTooth||'؟'} يحتاج فحصاً.<br><small class="text-gray-500">⚠️ لا يغني عن التشخيص</small>`,600);
    }
    
    function savePatient() {
        const name = document.getElementById('pName').value.trim(), phone = document.getElementById('pPhone').value.trim(), diag = document.getElementById('pDiag').value.trim();
        if(!name || !diag) return showToast("أكمل الاسم والشكوى", "error");
        const pid = 'local_' + Date.now();
        const data = { id: pid, name, phone, diag, tooth: currentTooth, date: new Date().toLocaleDateString('ar-EG'), timestamp: Date.now(), addedBy: currentUser?.id || 'admin', updatedAt: new Date().toISOString(), totalCost: 0, paidAmount: 0, payments: [], nextAppointment: '' };
        addToLocalDB(data);
        if(firebaseReady && db) db.ref('patients/' + pid).set(data).catch(()=>{});
        showToast("✅ تم الحفظ", "success");
        ['pName','pPhone','pDiag'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('aiBox').classList.add('d-none'); currentTooth = null; 
        document.querySelectorAll('.tooth-btn').forEach(x => x.classList.remove('selected')); 
        document.getElementById('selectedTooth').classList.add('d-none');
        updateStats(); loadTodayAppointments(); if(!document.getElementById('page-list').classList.contains('d-none')) loadData();
    }
        function registerPatient() {
        const name = document.getElementById('regName').value.trim(), phone = document.getElementById('regPhone').value.trim();
        if(!name || !phone) return showToast("أدخل الاسم والهاتف", "error");
        const pid = 'local_' + Date.now();
        const data = { id: pid, name, phone, birth: document.getElementById('regBirth').value, gender: document.getElementById('regGender').value, date: new Date().toLocaleDateString('ar-EG'), timestamp: Date.now(), createdAt: new Date().toISOString(), diag: 'تم التسجيل', totalCost: 0, paidAmount: 0, payments: [], nextAppointment: '', addedBy: currentUser?.id || 'system' };
        addToLocalDB(data);
        if(firebaseReady && db) db.ref('patients/' + pid).set(data).catch(()=>{});
        showToast("✅ تم التسجيل", "success");
        ['regName','regPhone','regBirth','regGender'].forEach(id => document.getElementById(id).value = '');
        updateStats(); if(!document.getElementById('page-list').classList.contains('d-none')) loadData();
    }
    
    function submitDoctorSubscription() {
        const name=document.getElementById('subName').value.trim(), email=document.getElementById('subEmail').value.trim(), pwd=document.getElementById('subPassword').value.trim();
        if(!name||!email||!pwd) return showToast("أكمل الحقول","error");
        if(firebaseReady && db) db.ref('doctor_subscriptions').push({name,email,password:pwd,specialty:document.getElementById('subSpecialty').value.trim(),status:'pending',requestedAt:new Date().toISOString()});
        showToast("✅ تم الإرسال! انتظر التفعيل","success"); 
        ['subName','subEmail','subPassword','subSpecialty'].forEach(id=>document.getElementById(id).value=''); 
        setTimeout(backToLogin,1500);
    }
    
    function startSubscriptionPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        if (!firebaseReady || !db) return;
        fetchPendingRequests();
        pollingInterval = setInterval(() => { fetchPendingRequests(true); }, 10000);
    }
    
    function fetchPendingRequests(isMonitoring = false) {
        db.ref('doctor_subscriptions').orderByChild('status').equalTo('pending').once('value')
        .then(snap => {
            renderPendingRequests(snap);
            if (isMonitoring) {
                const currentIds = []; let newCount = 0;
                snap.forEach(ch => { currentIds.push(ch.key); if (!lastPendingIds.includes(ch.key)) newCount++; });
                if (newCount > 0 && lastPendingIds.length > 0) {
                    showToast(`🔔 وارد ${newCount} طلب!`, "info");
                    showBrowserNotification("بَسْمَة AI", `${newCount} طلب جديد`);
                }
                lastPendingIds = currentIds;
            } else { lastPendingIds = []; snap.forEach(ch => lastPendingIds.push(ch.key)); }
        }).catch(()=>{});
    }
    
    function renderPendingRequests(snap) {
        const c = document.getElementById('doctorRequests'); if(!c) return;
        c.innerHTML = ''; let n = 0;
        snap.forEach(ch => {
            n++; const v = ch.val();
            c.innerHTML += `<div class="p-2 bg-gray-50 rounded-lg border text-xs flex justify-between items-center"><div><b>${v.name}</b><br><span class="text-gray-500">${v.email}</span></div><div class="flex gap-1"><button onclick="activateDoc('${ch.key}')" class="px-2 py-1 bg-green-100 text-green-700 rounded">تفعيل</button><button onclick="rejectDoc('${ch.key}')" class="px-2 py-1 bg-red-100 text-red-700 rounded">رفض</button></div></div>`;        });
        document.getElementById('pendingCount').innerText = n || 'لا توجد طلبات';
    }
    
    function activateDoc(id){ if(db) db.ref('doctor_subscriptions/'+id).update({status:'active'}).then(()=>{ showToast("✅ تم التفعيل","success"); fetchPendingRequests(); }); }
    function rejectDoc(id){ if(db) db.ref('doctor_subscriptions/'+id).update({status:'rejected'}).then(()=>{ showToast("تم الرفض","info"); fetchPendingRequests(); }); }
    
    function loadActiveDoctors() { 
        if(!firebaseReady || !db) return; 
        db.ref('doctor_subscriptions').orderByChild('status').equalTo('active').once('value').then(snap => {
            const c = document.getElementById('activeDoctors'); if(!c) return; c.innerHTML = '';
            if(!snap.exists()){ c.innerHTML = '<p class="text-xs text-gray-400 text-center">لا يوجد أطباء</p>'; return; }
            snap.forEach(ch => { const v = ch.val(); c.innerHTML += `<div class="p-2 bg-green-50 rounded-lg border text-xs flex justify-between"><span>👨‍⚕️ <b>${v.name}</b></span><button onclick="suspendDoc('${ch.key}')" class="px-2 py-1 bg-amber-100 text-amber-700 rounded">إيقاف</button></div>`; });
        });
    }
    function suspendDoc(id){ if(db) db.ref('doctor_subscriptions/'+id).update({status:'suspended'}).then(()=>{ showToast("⛔ تم الإيقاف","info"); loadActiveDoctors(); }); }
    
    function checkAppointmentAlerts() {
        const pts = getLocalDB(), now=new Date(), el=document.getElementById('alertList'), sec=document.getElementById('alertSection'), cnt=document.getElementById('alertCount');
        if(!el||!sec||!cnt) return; el.innerHTML=''; let ac=0, uc=0;
        pts.forEach(p=>{if(!p.nextAppointment) return; const ad=new Date(p.nextAppointment), dh=(ad-now)/(36e5); if(dh>0&&dh<=24){ac++; const u=dh<=2; if(u) uc++; const ts=ad.toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'}); el.innerHTML+=`<div class="p-2 rounded-lg border flex justify-between items-center ${u?'bg-red-50 border-red-200':'bg-amber-50 border-amber-200'}"><div><span class="font-bold text-sm">${p.name}</span><div class="text-[10px] text-gray-600">🕒 ${ts}</div></div><button onclick="event.stopPropagation();openWhatsApp('${p.phone}','${p.name}','موعدك ${ts}')" class="wa-btn-patient"><i class="fab fa-whatsapp"></i></button></div>`; if(u) { showBrowserNotification(`⏰ موعد عاجل: ${p.name}`,`بعد ${Math.round(dh*60)} دقيقة`); showToast(`⚠️ موعد عاجل: ${p.name}`,"warning"); }}});
        cnt.innerText=ac; if(ac>0){sec.classList.remove('d-none');cnt.className=uc>0?'status-badge status-urgent ml-auto':'status-badge status-pending ml-auto';} else sec.classList.add('d-none');
    }
    
    function openWhatsApp(phone,name,custom='') {
        if(!phone) return showToast("❌ لا يوجد رقم هاتف","error");
        let c=phone.replace(/[\s\-\(\)]/g,''); if(c.startsWith('09')) c='963'+c.substring(1); else if(!c.startsWith('+963')) c='963'+c;
        const m=custom||`مرحباً ${name}،\nمن عيادة بَسْمَة السنية.\nتذكير بموعدك القادم. 🦷✨`;
        window.open(`https://wa.me/${c}?text=${encodeURIComponent(m)}`,'_blank');
    }
    
    function filterPatients(q) { const ql=q.toLowerCase().trim(); let v=0; document.querySelectorAll('#patientContainer > div').forEach(card=>{ const t=card.innerText.toLowerCase(); if(ql===''||t.includes(ql)){card.classList.remove('d-none');v++;} else card.classList.add('d-none'); }); document.getElementById('noRecords').classList.toggle('d-none',v>0); }
    
    function loadData() { renderPatients(getLocalDB(),'local'); if(firebaseReady && db) { db.ref('patients').orderByChild('timestamp').off('value'); db.ref('patients').orderByChild('timestamp').on('value', snap=>{ patientsCache=[]; snap.forEach(ch=>patientsCache.push({firebaseId:ch.key,...ch.val()})); }); } }
    
    function renderPatients(data, source) {
        const c=document.getElementById('patientContainer'); if(!c) return; c.innerHTML='';
        if(!data||data.length===0){document.getElementById('noRecords').classList.remove('d-none');document.getElementById('recordsCount').innerText='0';return;}
        document.getElementById('noRecords').classList.add('d-none'); document.getElementById('recordsCount').innerText=data.length;
        [...data].sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).forEach(v=>{
            const pid=v.firebaseId||v.id, tooth=v.tooth?`<span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full inline-flex items-center gap-1">🦷 #${v.tooth}</span>`:'', diag=v.diag?(v.diag.length>60?v.diag.substring(0,60)+'...':v.diag):'بدون ملاحظات';
            c.innerHTML+=`<div class="section-card py-3 border-r-4 border-r-blue-500 cursor-pointer hover:shadow-md hover:border-r-cyan-500 transition bg-white" onclick="openPatientEdit('${pid}','${source}')"><div class="flex justify-between items-start"><div class="flex-1"><div class="flex items-center gap-2"><span class="font-bold text-sm text-blue-800">${v.name||'مريض'}</span>${v.phone?`<span class="text-[10px] text-gray-400">📱 ${v.phone}</span>`:''}</div>${tooth?`<div class="mt-1">${tooth}</div>`:''}<p class="text-xs text-gray-600 mt-2 line-clamp-2">${diag}</p></div><div class="text-left flex flex-col items-end gap-1"><span class="text-[10px] bg-gray-100 px-2 py-1 rounded">${v.date||'-'}</span><button onclick="event.stopPropagation();openWhatsApp('${v.phone}','${v.name}')" class="wa-btn-patient mt-1" title="واتساب"><i class="fab fa-whatsapp"></i></button></div></div></div>`;
        });
    }
    
    function openPatientEdit(pid, source) { const p=getLocalDB().find(x=>x.id===pid||x.firebaseId===pid); if(p) loadPatientToForm(p,'local'); else showToast("❌ غير موجود","error"); }
    
    function loadPatientToForm(p, src) {
        document.getElementById('editPatientId').value=p.firebaseId||p.id||''; document.getElementById('editPatientSource').value=src;
        document.getElementById('editName').value=p.name||''; document.getElementById('editPhone').value=p.phone||''; document.getElementById('editBirth').value=p.birth||''; document.getElementById('editGender').value=p.gender||'';        document.getElementById('editDiag').value=p.diag||''; document.getElementById('editTooth').value=p.tooth||''; document.getElementById('editNextAppt').value=p.nextAppointment||'';
        document.getElementById('editTotalCost').value=p.totalCost||''; document.getElementById('payTotal').innerText=p.totalCost||0; document.getElementById('payPaid').innerText=p.paidAmount||0; document.getElementById('payRemain').innerText=(p.totalCost||0)-(p.paidAmount||0);
        renderPayments(p.payments||[]);
        const dt=p.updatedAt||p.timestamp?new Date(p.updatedAt||p.timestamp).toLocaleString('ar-EG'):'-';
        document.getElementById('patientVisits').innerHTML=`<div class="p-2 bg-cyan-50 rounded-lg border text-xs"><span class="text-gray-500">📅 آخر تحديث: ${dt}</span></div>`;
        navTo('patient');
    }
    
    function updatePatient() { const id=document.getElementById('editPatientId').value, name=document.getElementById('editName').value.trim(); if(!id||!name) return showToast("الاسم مطلوب","error"); const data={name,phone:document.getElementById('editPhone').value.trim(),birth:document.getElementById('editBirth').value,gender:document.getElementById('editGender').value,diag:document.getElementById('editDiag').value.trim(),tooth:document.getElementById('editTooth').value||null,updatedAt:new Date().toISOString(),updatedBy:currentUser?.id||'admin'}; if(updateLocalDB(id,data)){ showToast("✅ تم التحديث","success"); navTo('list'); } else { showToast("❌ فشل التحديث","error"); } }
    
    function deletePatient() { const id=document.getElementById('editPatientId').value, name=document.getElementById('editName').value||'المريض'; if(!id||!confirm(`حذف "${name}"؟`)) return; deleteFromLocalDB(id); showToast("🗑️ تم الحذف","success"); navTo('list'); }
    
    function saveNextAppointment() { const id=document.getElementById('editPatientId').value, appt=document.getElementById('editNextAppt').value; if(!id) return; const data={nextAppointment:appt,updatedAt:new Date().toISOString()}; updateLocalDB(id,data); showToast("✅ تم الحفظ","success"); checkAppointmentAlerts(); }
    
    function updateTotalCost() { const id=document.getElementById('editPatientId').value, cost=parseFloat(document.getElementById('editTotalCost').value)||0; if(!id) return; document.getElementById('payTotal').innerText=cost; document.getElementById('payRemain').innerText=cost-(parseFloat(document.getElementById('payPaid').innerText)||0); const data={totalCost:cost,updatedAt:new Date().toISOString()}; updateLocalDB(id,data); showToast("✅ تم التحديث","success"); }
    
    function renderPayments(payments) { const c=document.getElementById('paymentHistory'); c.innerHTML=''; if(!payments.length) { c.innerHTML='<p class="text-xs text-gray-400 text-center">لا توجد مدفوعات</p>'; return; } payments.slice().reverse().forEach(p=>{c.innerHTML+=`<div class="p-2 bg-white rounded border flex justify-between items-center text-xs"><span class="font-bold text-green-600">💵 ${p.amount} ل.س</span><span class="text-gray-600">${p.note||'-'}</span><span class="text-gray-400">${p.date}</span></div>`;}); }
    
    function addPayment() { const id=document.getElementById('editPatientId').value, amount=parseFloat(document.getElementById('newPayAmount').value), note=document.getElementById('newPayNote').value.trim(); if(!id||isNaN(amount)||amount<=0) return showToast("أدخل مبلغاً صحيحاً","error"); const newPay={amount,note,date:new Date().toLocaleDateString('ar-EG'),timestamp:Date.now()}; const l=getLocalDB(), idx=l.findIndex(p=>p.id===id||p.firebaseId===id); if(idx!==-1){ const pays=l[idx].payments||[]; pays.push(newPay); const total=pays.reduce((s,x)=>s+x.amount,0); l[idx].payments=pays; l[idx].paidAmount=total; l[idx].updatedAt=new Date().toISOString(); saveLocalDB(l); document.getElementById('payPaid').innerText=total; document.getElementById('payRemain').innerText=(l[idx].totalCost||0)-total; renderPayments(pays); document.getElementById('newPayAmount').value=''; document.getElementById('newPayNote').value=''; showToast("✅ تم التسجيل","success"); } }
    
    function loadTodayAppointments() { const d = new Date(); const today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); const pts=getLocalDB(); renderTodayAppts(pts,today); }
    
    function renderTodayAppts(pts,today) { const con=document.getElementById('todayAppointmentsList'), sec=document.getElementById('todayAppointmentsSection'); con.innerHTML=''; const tm=pts.filter(p=>p.nextAppointment && p.nextAppointment.startsWith(today)).sort((a,b)=>(a.nextAppointment||'').localeCompare(b.nextAppointment||'')); document.getElementById('todayCountBadge').innerText=tm.length; if(tm.length===0){sec.classList.add('d-none');return;} sec.classList.remove('d-none'); tm.forEach(p=>{const t=p.nextAppointment.includes('T')?p.nextAppointment.split('T')[1].substring(0,5):'-'; con.innerHTML+=`<div class="p-2 bg-white rounded-lg border flex justify-between items-center hover:bg-blue-50 cursor-pointer" onclick="openPatientEdit('${p.firebaseId||p.id}','local')"><div><span class="font-bold text-sm">👤 ${p.name}</span><div class="text-[10px] text-gray-500">🕒 ${t}</div></div><button onclick="event.stopPropagation();openWhatsApp('${p.phone}','${p.name}','موعدك اليوم ${t}')" class="wa-btn-patient"><i class="fab fa-whatsapp"></i></button></div>`;}); }
    
    function updateStats() { const today=new Date().toLocaleDateString('ar-EG'); const l=getLocalDB(); document.getElementById('statPatients').innerText=l.length; document.getElementById('statToday').innerText=l.filter(d=>d.date===today).length; document.getElementById('statDoctors').innerText='0'; }
    
    // ✅ عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => { 
        console.log("🦷 بَسْمَة جاهز!");
        // عرض التطبيقات فوراً إذا كانت محفوظة
        setTimeout(renderExternalApps, 200);
    });
</script>
