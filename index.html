<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَسْمَة AI - إدارة عيادة الأسنان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; }
        .tooth-icon { color: #3b82f6; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loginPage" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
            <div class="mb-6">
                <i class="fas fa-tooth fa-4x tooth-icon mb-4"></i>
                <h1 class="text-3xl font-bold text-blue-600">بَسْمَة AI</h1>
                <p class="text-gray-500 mt-2">مستقبل طب الأسنان الرقمي</p>
            </div>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">دخول النظام</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t py-4 text-center">
        <p class="text-gray-600 text-sm">
            تم التطوير والتصميم بواسطة 
            <span class="font-bold text-blue-600 underline">د. زكريا محمد عطوني</span>
            &copy; 2026
        </p>
    </footer>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if(email === "salematto@gmail.com" && pass === "zak1959") {
                alert("تم تسجيل الدخول بنجاح يا دكتور!");
                // هنا سيتم توجيهك للوحة التحكم في الخطوة القادمة
            } else {
                alert("البيانات غير صحيحة، يرجى المحاولة مرة أخرى.");
            }
        }
    </script>
</body>
</html>
