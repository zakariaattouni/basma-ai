<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَسْمَة AI - النظام الذكي المتكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
        .scroll-tabs { display: flex; overflow-x: auto; white-space: nowrap; scrollbar-width: none; -ms-overflow-style: none; }
        .scroll-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; padding: 10px 18px; margin: 0 4px; border-radius: 20px; background: white; border: 1px solid #e2e8f0; font-size: 0.85rem; transition: all 0.3s; cursor: pointer; }
        .tab-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .tooth-logo { color: #2563eb; filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.4)); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loginPage" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-t-8 border-blue-600">
            <i class="fas fa-tooth fa-3x tooth-logo mb-4"></i>
            <h1 class="text-2xl font-bold text-blue-700 mb-6">بَسْمَة AI</h1>
            <input type="email" id="email" placeholder="البريد" class="w-full p-3 border rounded-xl mb-4 outline-none">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">دخول</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex-grow flex flex-col">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center border-b px-6">
            <div class="flex items-center space-x-2 space-x-reverse">
                <i class="fas fa-tooth text-blue-600"></i>
                <span class="font-bold text-blue-700">بَسْمَة AI</span>
            </div>
            <span class="text-xs font-bold text-gray-700 underline">د. زكريا محمد عطوني</span>
        </header>

        <div class="bg-blue-50 p-3 border-b sticky top-0 z-50">
            <div class="scroll-tabs px-2">
                <button onclick="showSection('add')" id="btn-add" class="tab-btn active"><i class="fas fa-plus ml-1"></i> مريض جديد</button>
                <button onclick="showSection('list')" id="btn-list" class="tab-btn"><i class="fas fa-list ml-1"></i> السجل</button>
                <button onclick="showSection('ai')" id="btn-ai" class="tab-btn font-bold text-indigo-700 border-indigo-200"><i class="fas fa-robot ml-1"></i> نافذة AI</button>
                <button onclick="location.reload()" class="tab-btn text-red-500 font-bold border-red-100">خروج</button>
            </div>
        </div>

        <main class="p-4 max-w-lg mx-auto w-full space-y-4">
            
            <div id="section-add" class="bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="font-bold mb-4 text-blue-700">تسجيل مريض</h3>
                <input type="text" id="pName" placeholder="اسم المريض" class="w-full p-3 bg-gray-50 border rounded-xl mb-3 outline-none">
                <textarea id="pDiagnosis" placeholder="اكتب التشخيص أو شكوى المريض..." class="w-full p-3 bg-gray-50 border rounded-xl mb-3 h-24 outline-none"></textarea>
                
                <div id="inlineAI" class="hidden bg-indigo-50 p-3 rounded-xl border border-indigo-100 text-xs mb-3 text-indigo-800 italic"></div>
                <div class="flex gap-2">
                    <button onclick="runAI('pDiagnosis', 'inlineAI')" class="flex-1 bg-indigo-100 text-indigo-700 py-3 rounded-xl font-bold border border-indigo-200"><i class="fas fa-magic ml-1"></i> تحليل سريع</button>
                    <button onclick="savePatient()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md">حفظ البيانات</button>
                </div>
            </div>

            <div id="section-ai" class="hidden bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                <h3 class="font-bold text-indigo-800 mb-4"><i class="fas fa-brain ml-2"></i> استشارة ذكية مباشرة</h3>
                <textarea id="aiStandaloneInput" placeholder="اكتب وصف الحالة هنا للتحليل الفوري..." class="w-full p-4 bg-white border border-indigo-100 rounded-2xl mb-4 h-32 outline-none text-sm"></textarea>
                <div id="standaloneAIResult" class="hidden bg-white p-4 rounded-xl border border-indigo-200 text-sm mb-4 shadow-sm text-indigo-900"></div>
                <button onclick="runAI('aiStandaloneInput', 'standaloneAIResult')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg"><i class="fas fa-search-plus ml-2"></i> حلل الحالة الآن</button>
            </div>

            <div id="section-list" class="hidden bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="font-bold mb-4">المراجعات السابقة</h3>
                <div id="patientList" class="space-y-3"></div>
            </div>

        </main>
    </div>

    <footer class="bg-white border-t py-6 text-center mt-auto">
        <p class="text-gray-400 text-xs font-bold uppercase">تصميم وتطوير: د. زكريا محمد عطوني &copy; 2026</p>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://basma-clinic-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email === "salematto@gmail.com" && pass === "zak1959") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadPatients();
            } else { alert("خطأ في الدخول"); }
        }

        function showSection(name) {
            ['add', 'list', 'ai'].forEach(s => document.getElementById('section-'+s).classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-'+name).classList.remove('hidden');
            document.getElementById('btn-'+name).classList.add('active');
        }

        // محرك الذكاء الموحد
        function runAI(inputId, resultId) {
            const text = document.getElementById(inputId).value.toLowerCase();
            const resBox = document.getElementById(resultId);
            
            if(!text) { alert("أدخل الوصف أولاً"); return; }
            
            resBox.classList.remove('hidden');
            resBox.innerHTML = "جاري التحليل السريري...";
            
            setTimeout(() => {
                let advice = "<b>تحليل AI:</b> الحالة تتطلب فحصاً سريرياً مباشراً وصورة أشعة ذروية.";
                if(text.includes("نبح") || text.includes("سهرني")) advice = "<b>AI:</b> ألم نبضي يشير لالتهاب عصب حاد. الإجراء: سحب عصب.";
                if(text.includes("عالي") || text.includes("اطبق")) advice = "<b>AI:</b> علامات التهاب ذروي. الإجراء: تطهير القنوات.";
                if(text.includes("وارم") || text.includes("خدي")) advice = "<b>AI:</b> وجود خراج نشط. الإجراء: تصريف ووصف مضاد حيوي.";
                if(text.includes("دم") || text.includes("لحم")) advice = "<b>AI:</b> مشاكل لثوية. الإجراء: تقليح لثوي عميق.";
                
                resBox.innerHTML = advice;
            }, 800);
        }

        function savePatient() {
            const name = document.getElementById('pName').value;
            const diag = document.getElementById('pDiagnosis').value;
            if(!name) { alert("أدخل اسم المريض"); return; }
            db.ref('patients').push({ name, diagnosis: diag, date: new Date().toLocaleDateString('ar-EG') })
              .then(() => { alert("تم الحفظ!"); document.getElementById('pName').value = ''; document.getElementById('pDiagnosis').value = ''; document.getElementById('inlineAI').classList.add('hidden'); });
        }

        function loadPatients() {
            db.ref('patients').on('value', snap => {
                const list = document.getElementById('patientList');
                list.innerHTML = '';
                snap.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `<div class="p-3 bg-gray-50 border rounded-xl"><h4 class="font-bold text-blue-900">${d.name}</h4><p class="text-xs text-gray-500">${d.diagnosis}</p></div>`;
                });
            });
        }
    </script>
</body>
</html>
